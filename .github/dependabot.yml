version: 2
updates:
  # GitHub uses the "npm" ecosystem for npm, yarn, and pnpm manifests/lockfiles.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    groups:
      dev-dependencies:
        dependency-type: "development"
        patterns:
          - "*"
